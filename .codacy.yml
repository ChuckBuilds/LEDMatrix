---
# Codacy configuration for LEDMatrix
# Docs: https://docs.codacy.com/repositories-configure/codacy-configuration-file/

engines:
  semgrep:
    enabled: true
  eslint:
    enabled: true

exclude_paths:
  # Exclude test fixtures and generated assets
  - "plugin-repos/**"
  - "plugins/**"
  - "assets/**"
  - "test/**"
  - "scripts/debug/**"
